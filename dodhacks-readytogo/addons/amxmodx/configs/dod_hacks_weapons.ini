
;
; set a title for the menu
;

"@menu_title_british"   "Main Gun (British vs. Axis)"
"@menu_title_allies"    "Main Gun (Allies vs. Axis)"

;
; allow all weapons on all maps
;
; if "1", british players will be able to use british+allies guns
; and allies players will be able to use allies+british guns
; however, when a british player uses an allies gun or
; when an allies player uses a british gun, their arm skin
; will not appear on the screen anymore
; at the moment, this can't be fixed
;
; if "0", only british+axis weapons will be availble on british maps
; and only allies+axis weapons will be available on allies maps
; in this case, there will be no visual bugs at all
;

"@allow_all"    "1"

;
; mysql or sqlite (driver)
;
; if sqlite (local storage), no need of host, user and pass
;

"@db_driver"    "sqlite"
"@db_host"      ""
"@db_user"      ""
"@db_pass"      ""
"@db_name"      "dod_hacks_weapons"

;
; secondary weapons ammo to give at spawn (-1 or 0 to not alter default game value)
;
; colt: 210 bullets will display 30 clips (7[per_clip]*30=210)
; luger: 160 bullets will display 20 clips (8[per_clip]*20=160)
; webley: 54 bullets will display 9 clips (6[per_clip]*9=54)
;

"@weapon_colt"      "210"   "ammo_12mm"
"@weapon_luger"     "160"   "ammo_12mm"
"@weapon_webley"    "54"    "ammo_12mm"

;
; 0.0 -> infinity
;
; 15.0 -> if 15.0 seconds elapsed since player spawned, they can still use 'guns' command,
; but their gun selection will only update the next time they spawn
;
; you can specify any value of time you want
;

"@max_seconds"      "0.0"

;
; seconds to wait between two weapon selections
; a protection to avoid spamming the game server
;

"@selection_delay"  "5.0"

;
; if 1, when someone types 'guns' command, it will hide the 'guns' chat message
;

"@hide_chat_cmd"    "1"

;
; add an asterisk (* symbol) as a suffix in weapon names which are admin-only (if any)
;

"@admin_asterisk"   "1"

;
; 1 to delete the dropped gun (if any) when selecting a new one via the menu
;

"@drop_delete"      "1"

;
; how fast to delete the dropped gun (seconds), if "@drop_delete" is set to "1"
; 0.000001 (minimum time) and 5.0 (a value of 5 seconds) [examples]
; game's default value is 20.0 seconds
;

"@delete_time"      "5.0"

;
; whether or not to use a visual effect on the hud message(s)
;
; (i.e. "NO ACCESS!" and "WAIT 2.0 SEC!")
;

"@hud_effects"      "1"

;
; vertical position of the hud message(s)
; (0.0 <-> 1.0)
; use increments/ decrements of 0.05
;
; (i.e. "NO ACCESS!" and "WAIT 2.0 SEC!")
;

"@ver_pos"          "0.35"

;
; horizontal position of the hud message(s)
; (0.0 <-> 1.0) or -1.0 (center of screen)
; use increments/ decrements of 0.05
;
; (i.e. "NO ACCESS!" and "WAIT 2.0 SEC!")
;

"@hor_pos"          "0.0"

;
; make 'guns' command require admin access
; providing multiple flags (a mix of them) is allowed
; use "" to allow everyone in the server use the feature
;

"@admin_access"     ""

;
; require admin access to receive hand gun ammo during spawn
; providing multiple flags (a mix of them) is allowed
; use "" to disable requiring admin access
;

"@handguns_access"  ""

;
; sniper gun team limitation (def "25.0")
;
; use "0.0" to block sniper
; use "1.0" to limit a single sniper gun per team
; use "100.0" to allow anyone use sniper at anytime
;
; to allow max. 2 out of 16, use "12.5"
; to allow max. 3 out of 16, use "18.75"
; to allow max. 4 out of 16, use "25.0"
; to allow max. 5 out of 16, use "31.25"
; to allow max. 6 out of 16, use "37.5"
; to allow max. 7 out of 16, use "43.75"
; to allow max. 8 out of 16, use "50.0"
;

"@limit_sniper"     "25.0"

;
; machine gun team limitation (def "12.5")
;
; use "0.0" to block machine
; use "1.0" to limit a single machine gun per team
; use "100.0" to allow anyone use machine at anytime
;
; to allow max. 2 out of 16, use "12.5"
; to allow max. 3 out of 16, use "18.75"
; to allow max. 4 out of 16, use "25.0"
; to allow max. 5 out of 16, use "31.25"
; to allow max. 6 out of 16, use "37.5"
; to allow max. 7 out of 16, use "43.75"
; to allow max. 8 out of 16, use "50.0"
;

"@limit_machine"    "12.5"

;
; rocket gun team limitation (def "100.0")
;
; use "0.0" to block rocket
; use "1.0" to limit a single rocket gun per team
; use "100.0" to allow anyone use rocket at anytime
;
; to allow max. 2 out of 16, use "12.5"
; to allow max. 3 out of 16, use "18.75"
; to allow max. 4 out of 16, use "25.0"
; to allow max. 5 out of 16, use "31.25"
; to allow max. 6 out of 16, use "37.5"
; to allow max. 7 out of 16, use "43.75"
; to allow max. 8 out of 16, use "50.0"
;

"@limit_rocket"     "100.0"

;
; if "1", bots are included into the percents above
; use "0" to exclude bots
;

"@include_bots"     "1"

